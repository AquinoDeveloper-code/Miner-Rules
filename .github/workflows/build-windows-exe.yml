name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "*.py"
      - "*.spec"
      - "requirements*.txt"
      - "build_windows.bat"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt

      - name: Build executable
        run: python -m PyInstaller --noconfirm --clean eternal_mine.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinaDosEscravosEternos-windows
          path: dist/MinaDosEscravosEternos.exe
